<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>発見ニュースまとめ</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f7f7f5;
    --card-bg: #ffffff;
    --text: #1a1a1a;
    --text-muted: #6b6b6b;
    --border: #e4e4e0;
    --accent: #2563eb;
    --chip-bg: #eef2ff;
    --chip-text: #3730a3;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #14151a;
      --card-bg: #1d1e24;
      --text: #f0f0f0;
      --text-muted: #9a9aa5;
      --border: #2c2d34;
      --accent: #7aa2ff;
      --chip-bg: #232a45;
      --chip-text: #b3c2ff;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 1rem;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    line-height: 1.6;
    max-width: 720px;
    margin-inline: auto;
  }
  h1 {
    font-size: 1.4rem;
    margin: 0.5rem 0 0.2rem;
  }
  .updated {
    color: var(--text-muted);
    font-size: 0.85rem;
    margin-bottom: 1rem;
  }
  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-bottom: 0.8rem;
  }
  .filters.lang-filters {
    margin-bottom: 1rem;
  }
  .filter-btn {
    border: 1px solid var(--border);
    background: var(--card-bg);
    color: var(--text);
    border-radius: 999px;
    padding: 0.3rem 0.8rem;
    font-size: 0.85rem;
    cursor: pointer;
  }
  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .lang-filters .filter-btn {
    font-weight: 600;
  }
  .date-group {
    margin-bottom: 1.5rem;
  }
  .date-heading {
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text-muted);
    margin: 0 0 0.5rem;
    border-bottom: 1px solid var(--border);
    padding-bottom: 0.3rem;
  }
  .article {
    display: flex;
    align-items: flex-start;
    gap: 0.7rem;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.8rem 1rem;
    margin-bottom: 0.6rem;
  }
  .thumb {
    flex-shrink: 0;
    width: 64px;
    height: 64px;
    border-radius: 8px;
    object-fit: cover;
    background: var(--chip-bg);
  }
  .thumb-fallback {
    flex-shrink: 0;
    width: 64px;
    height: 64px;
    border-radius: 8px;
    background: var(--chip-bg);
    color: var(--chip-text);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    font-weight: 700;
  }
  .article-link {
    flex: 1;
    min-width: 0;
    text-decoration: none;
    color: var(--text);
  }
  .article-link:active {
    opacity: 0.8;
  }
  .article-title {
    font-size: 1rem;
    font-weight: 500;
  }
  .article-summary {
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-top: 0.25rem;
  }
  .tag-row {
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem;
    margin-top: 0.4rem;
  }
  .tag {
    display: inline-block;
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-size: 0.7rem;
    border-radius: 999px;
    padding: 0.05rem 0.5rem;
  }
  .article.read {
    opacity: 0.55;
  }
  .chip {
    display: inline-block;
    background: var(--chip-bg);
    color: var(--chip-text);
    font-size: 0.75rem;
    border-radius: 6px;
    padding: 0.1rem 0.5rem;
    margin-bottom: 0.35rem;
  }
  .like-btn {
    flex-shrink: 0;
    border: none;
    background: none;
    font-size: 1.4rem;
    line-height: 1;
    cursor: pointer;
    padding: 0.2rem;
    color: var(--text-muted);
  }
  .like-btn.liked {
    color: #e0245e;
  }
  .toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 0.8rem;
  }
  .copy-btn {
    border: 1px solid var(--border);
    background: var(--card-bg);
    color: var(--text);
    border-radius: 8px;
    padding: 0.3rem 0.7rem;
    font-size: 0.8rem;
    cursor: pointer;
    white-space: nowrap;
  }
  .empty {
    color: var(--text-muted);
    text-align: center;
    padding: 2rem 0;
  }
</style>
</head>
<body>
  <h1>発見ニュースまとめ</h1>
  <div class="toolbar">
    <div class="updated" id="updated"></div>
    <button class="copy-btn" id="copy-likes-btn">♥ 好みをコピー</button>
  </div>
  <div class="filters lang-filters" id="lang-filters"></div>
  <div class="filters" id="filters"></div>
  <div id="list"></div>

  <script>
    const LANGS = { ja: "日本語", en: "English", es: "Español" };
    const LIKES_KEY = "newsDigestLikes";
    const READS_KEY = "newsDigestReads";
    const state = { articles: [], lang: "ja", category: "すべて", likesOnly: false, unreadOnly: false };

    function loadFromStorage(key) {
      try {
        return JSON.parse(localStorage.getItem(key)) || {};
      } catch {
        return {};
      }
    }

    function loadLikes() {
      return loadFromStorage(LIKES_KEY);
    }

    function saveLikes(likes) {
      localStorage.setItem(LIKES_KEY, JSON.stringify(likes));
    }

    function isLiked(url) {
      return !!loadLikes()[url];
    }

    function toggleLike(url) {
      const likes = loadLikes();
      if (likes[url]) {
        delete likes[url];
      } else {
        likes[url] = true;
      }
      saveLikes(likes);
      render();
    }

    function loadReads() {
      return loadFromStorage(READS_KEY);
    }

    function saveReads(reads) {
      localStorage.setItem(READS_KEY, JSON.stringify(reads));
    }

    function isRead(url) {
      return !!loadReads()[url];
    }

    function markRead(url) {
      const reads = loadReads();
      if (reads[url]) return;
      reads[url] = true;
      saveReads(reads);
      render();
    }

    async function copyLikesToClipboard() {
      const likes = loadLikes();
      const liked = state.articles.filter(a => likes[a.url]);
      const text = JSON.stringify(
        liked.map(a => ({ date: a.date, lang: a.lang, category: a.category, title: a.title, url: a.url })),
        null, 2
      );
      try {
        await navigator.clipboard.writeText(text || "[]");
        alert(`${liked.length}件の「いいね」記事をコピーしました。次回Claudeに更新を頼むときに貼り付けてください。`);
      } catch {
        alert("コピーに失敗しました。ブラウザの権限設定を確認してください。");
      }
    }

    async function load() {
      const res = await fetch("data/news.json", { cache: "no-store" });
      state.articles = await res.json();
      document.getElementById("copy-likes-btn").onclick = copyLikesToClipboard;
      render();
    }

    function render() {
      renderUpdated();
      renderLangFilters();
      renderFilters();
      renderList();
    }

    function renderUpdated() {
      const el = document.getElementById("updated");
      if (!state.articles.length) { el.textContent = ""; return; }
      const latest = [...state.articles].sort((a, b) => b.date.localeCompare(a.date))[0];
      el.textContent = `最終更新: ${latest.date} / 記事数: ${state.articles.length}`;
    }

    function renderLangFilters() {
      const el = document.getElementById("lang-filters");
      el.innerHTML = "";
      for (const [code, label] of Object.entries(LANGS)) {
        const btn = document.createElement("button");
        btn.className = "filter-btn" + (code === state.lang ? " active" : "");
        btn.textContent = label;
        btn.onclick = () => { state.lang = code; state.category = "すべて"; render(); };
        el.appendChild(btn);
      }
    }

    function renderFilters() {
      const inLang = state.articles.filter(a => a.lang === state.lang);
      const cats = ["すべて", ...new Set(inLang.map(a => a.category))];
      const el = document.getElementById("filters");
      el.innerHTML = "";
      for (const cat of cats) {
        const btn = document.createElement("button");
        btn.className = "filter-btn" + (cat === state.category ? " active" : "");
        btn.textContent = cat;
        btn.onclick = () => { state.category = cat; render(); };
        el.appendChild(btn);
      }
      const likeBtn = document.createElement("button");
      likeBtn.className = "filter-btn" + (state.likesOnly ? " active" : "");
      likeBtn.textContent = "♥ お気に入りのみ";
      likeBtn.onclick = () => { state.likesOnly = !state.likesOnly; render(); };
      el.appendChild(likeBtn);

      const unreadBtn = document.createElement("button");
      unreadBtn.className = "filter-btn" + (state.unreadOnly ? " active" : "");
      unreadBtn.textContent = "未読のみ";
      unreadBtn.onclick = () => { state.unreadOnly = !state.unreadOnly; render(); };
      el.appendChild(unreadBtn);
    }

    function makeThumbFallback(category) {
      const el = document.createElement("div");
      el.className = "thumb-fallback";
      el.textContent = (category || "?").trim().charAt(0).toUpperCase();
      return el;
    }

    function renderList() {
      const el = document.getElementById("list");
      el.innerHTML = "";
      const likes = loadLikes();
      const reads = loadReads();
      const inLang = state.articles.filter(a => a.lang === state.lang);
      let filtered = state.category === "すべて"
        ? inLang
        : inLang.filter(a => a.category === state.category);
      if (state.likesOnly) {
        filtered = filtered.filter(a => likes[a.url]);
      }
      if (state.unreadOnly) {
        filtered = filtered.filter(a => !reads[a.url]);
      }

      if (!filtered.length) {
        el.innerHTML = '<div class="empty">記事がありません</div>';
        return;
      }

      const byDate = {};
      for (const a of filtered) {
        (byDate[a.date] ??= []).push(a);
      }
      const dates = Object.keys(byDate).sort((a, b) => b.localeCompare(a));

      for (const date of dates) {
        const group = document.createElement("div");
        group.className = "date-group";
        const heading = document.createElement("div");
        heading.className = "date-heading";
        heading.textContent = date;
        group.appendChild(heading);

        for (const a of byDate[date]) {
          const card = document.createElement("div");
          card.className = "article" + (isRead(a.url) ? " read" : "");

          if (a.image) {
            const thumb = document.createElement("img");
            thumb.className = "thumb";
            thumb.src = a.image;
            thumb.alt = "";
            thumb.loading = "lazy";
            thumb.onerror = () => { thumb.replaceWith(makeThumbFallback(a.category)); };
            card.appendChild(thumb);
          } else {
            card.appendChild(makeThumbFallback(a.category));
          }

          const link = document.createElement("a");
          link.className = "article-link";
          link.href = a.url;
          link.target = "_blank";
          link.rel = "noopener noreferrer";
          const summaryHtml = a.summary ? `<div class="article-summary">${a.summary}</div>` : "";
          const tagsHtml = (a.tags && a.tags.length)
            ? `<div class="tag-row">${a.tags.map(t => `<span class="tag">#${t}</span>`).join("")}</div>`
            : "";
          link.innerHTML = `<span class="chip">${a.category}</span><div class="article-title">${a.title}</div>${summaryHtml}${tagsHtml}`;
          link.addEventListener("click", () => markRead(a.url));
          card.appendChild(link);

          const liked = isLiked(a.url);
          const likeButton = document.createElement("button");
          likeButton.className = "like-btn" + (liked ? " liked" : "");
          likeButton.textContent = liked ? "♥" : "♡";
          likeButton.setAttribute("aria-label", "いいね");
          likeButton.onclick = () => toggleLike(a.url);
          card.appendChild(likeButton);

          group.appendChild(card);
        }
        el.appendChild(group);
      }
    }

    load();
  </script>
</body>
</html>
