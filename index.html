<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>発見ニュースまとめ</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%94%AD%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    color-scheme: light dark;
    --bg: #f4f5f9;
    --bg-elevated: #ffffff;
    --text: #14161a;
    --text-muted: #5b6270;
    --border: #e2e4e9;
    --accent: #4f46e5;
    --accent-2: #db2777;
    --accent-contrast: #ffffff;
    --chip-bg: #eef0ff;
    --chip-text: #4338ca;
    --danger: #e0245e;
    --shadow: 0 1px 2px rgba(16,24,40,.04), 0 2px 8px rgba(16,24,40,.06);
    --shadow-hover: 0 10px 24px -6px color-mix(in srgb, var(--accent) 35%, transparent), 0 4px 10px rgba(16,24,40,.08);
    --maxw: 1080px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0b0c0f;
      --bg-elevated: #16181d;
      --text: #e8e9ec;
      --text-muted: #9298a5;
      --border: #2a2d34;
      --accent: #818cf8;
      --accent-2: #f472b6;
      --accent-contrast: #0b0c0f;
      --chip-bg: #23263a;
      --chip-text: #c7d2fe;
      --shadow: 0 1px 2px rgba(0,0,0,.4), 0 2px 10px rgba(0,0,0,.3);
      --shadow-hover: 0 10px 26px -6px color-mix(in srgb, var(--accent) 45%, transparent), 0 6px 16px rgba(0,0,0,.4);
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    line-height: 1.6;
  }
  a { color: inherit; }

  .top-accent-bar {
    height: 4px;
    background: linear-gradient(90deg, #4338ca, #7c3aed, #db2777, #f59e0b);
  }

  /* ---- Masthead (scrolls away, not sticky) ---- */
  .masthead {
    background: linear-gradient(135deg, #4338ca 0%, #6d28d9 55%, #9333ea 100%);
    color: #fff;
    padding: 1.5rem clamp(1rem, 4vw, 2rem) 1.3rem;
  }
  @media (prefers-color-scheme: dark) {
    .masthead { background: linear-gradient(135deg, #1e1b4b 0%, #3b0764 60%, #4c0519 100%); }
  }
  .masthead-inner {
    max-width: var(--maxw);
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .brand { display: flex; align-items: center; gap: 0.7rem; }
  .brand-badge {
    font-size: 1.7rem;
    background: rgba(255,255,255,.16);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.28);
    border-radius: 12px;
    padding: 0.4rem 0.55rem;
    line-height: 1;
  }
  .brand h1 {
    font-size: clamp(1.3rem, 2.6vw, 1.7rem);
    font-weight: 800;
    margin: 0;
    letter-spacing: -0.01em;
  }
  .brand .tagline {
    margin: 0.2rem 0 0;
    color: rgba(255,255,255,.82);
    font-size: 0.85rem;
  }
  .masthead .updated {
    color: rgba(255,255,255,.85);
    font-size: 0.78rem;
    background: rgba(255,255,255,.14);
    border-radius: 999px;
    padding: 0.3rem 0.75rem;
    white-space: nowrap;
  }

  /* ---- Sticky toolbar (slim, always visible) ---- */
  .site-header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: color-mix(in srgb, var(--bg) 92%, transparent);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    padding: 0.7rem clamp(1rem, 4vw, 2rem) 0;
  }
  .toolbar-row {
    max-width: var(--maxw);
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 0.6rem;
    flex-wrap: wrap;
    padding-bottom: 0.6rem;
  }
  .toolbar-actions {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .filter-toggle-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    border: 1px solid var(--border);
    background: var(--bg-elevated);
    color: var(--text);
    border-radius: 999px;
    padding: 0.35rem 0.85rem;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    box-shadow: var(--shadow);
    white-space: nowrap;
    max-width: 46vw;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .filter-toggle-btn.has-filter { border-color: var(--accent); color: var(--accent); }
  .filter-toggle-btn .chevron { font-size: 0.65rem; transition: transform .2s ease; flex-shrink: 0; }
  .filter-toggle-btn[aria-expanded="true"] .chevron { transform: rotate(180deg); }

  .copy-btn {
    border: 1px solid var(--border);
    background: var(--bg-elevated);
    color: var(--text);
    border-radius: 999px;
    padding: 0.35rem 0.75rem;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    box-shadow: var(--shadow);
  }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
  .copy-btn-short { display: none; }
  @media (max-width: 380px) {
    .copy-btn-full { display: none; }
    .copy-btn-short { display: inline; }
  }

  .search-row {
    max-width: var(--maxw);
    margin: 0 auto;
    padding-bottom: 0.6rem;
  }
  .search-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }
  .search-icon {
    position: absolute;
    left: 0.75rem;
    font-size: 0.85rem;
    opacity: 0.6;
    pointer-events: none;
  }
  .search-input {
    width: 100%;
    border: 1px solid var(--border);
    background: var(--bg-elevated);
    color: var(--text);
    border-radius: 999px;
    padding: 0.5rem 2.2rem 0.5rem 2.1rem;
    font-size: 0.88rem;
    box-shadow: var(--shadow);
    font-family: inherit;
  }
  .search-input:focus { outline: none; border-color: var(--accent); }
  .search-input::-webkit-search-cancel-button { display: none; }
  .search-clear {
    position: absolute;
    right: 0.5rem;
    border: none;
    background: none;
    color: var(--text-muted);
    font-size: 0.85rem;
    cursor: pointer;
    padding: 0.3rem;
    line-height: 1;
  }
  .search-clear:hover { color: var(--accent); }
  .search-clear[hidden] { display: none; }

  .filters {
    max-width: var(--maxw);
    margin: 0 auto;
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    padding-bottom: 0.5rem;
  }
  .filter-btn {
    border: 1px solid var(--border);
    background: var(--bg-elevated);
    color: var(--text);
    border-radius: 999px;
    padding: 0.32rem 0.85rem;
    font-size: 0.83rem;
    font-weight: 600;
    cursor: pointer;
    transition: background .12s ease, color .12s ease, border-color .12s ease, box-shadow .12s ease, transform .12s ease;
  }
  .filter-btn:hover { border-color: var(--accent); transform: translateY(-1px); }
  .filter-btn.active {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    border-color: transparent;
    color: var(--accent-contrast);
    box-shadow: 0 4px 12px -2px color-mix(in srgb, var(--accent) 45%, transparent);
  }
  .lang-filters .filter-btn { font-weight: 700; }

  /* ---- Collapsible filter panel (categories + tag chip + toggles) ---- */
  .filter-panel {
    max-width: var(--maxw);
    margin: 0 auto;
    overflow: hidden;
    max-height: 640px;
    opacity: 1;
    transition: max-height .28s ease, opacity .2s ease, padding .2s ease;
  }
  .filter-panel.collapsed {
    max-height: 0;
    opacity: 0;
    pointer-events: none;
  }
  @media (min-width: 860px) {
    .filter-toggle-btn { display: none; }
    .filter-panel, .filter-panel.collapsed {
      max-height: none !important;
      opacity: 1 !important;
      pointer-events: auto !important;
    }
  }

  .tag-filter-bar {
    max-width: var(--maxw);
    margin: 0 auto;
    padding-bottom: 0.6rem;
  }
  .tag-filter-chip {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    background: var(--chip-bg);
    color: var(--chip-text);
    border: none;
    border-radius: 999px;
    padding: 0.3rem 0.8rem;
    font-size: 0.82rem;
    cursor: pointer;
    font-weight: 600;
  }

  main {
    max-width: var(--maxw);
    margin: 0 auto;
    padding: 1.4rem clamp(1rem, 4vw, 2rem) 3rem;
  }

  .category-group { margin-bottom: 1.6rem; }
  .category-summary {
    font-size: 1.02rem;
    font-weight: 800;
    color: var(--text);
    cursor: pointer;
    padding: 0.5rem 0.1rem;
    border-bottom: 2px solid var(--border);
    margin-bottom: 0.9rem;
    list-style: none;
    letter-spacing: -0.01em;
  }
  .category-summary::-webkit-details-marker { display: none; }
  .category-summary::before {
    content: "▸";
    display: inline-block;
    margin-right: 0.4rem;
    color: var(--accent);
    transition: transform .15s ease;
  }
  details[open] > .category-summary::before { transform: rotate(90deg); }
  .category-summary .cat-count {
    color: var(--text-muted);
    font-weight: 500;
    font-size: 0.78rem;
    margin-left: 0.4rem;
  }

  .date-group {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1rem;
    margin-bottom: 1.5rem;
  }
  .date-heading {
    grid-column: 1 / -1;
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--text-muted);
    margin: 0;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .article-card {
    display: flex;
    flex-direction: column;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: var(--shadow);
    overflow: hidden;
    transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
  }
  @media (hover: hover) {
    .article-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-hover); border-color: color-mix(in srgb, var(--accent) 35%, var(--border)); }
    .article-card:hover .thumb { transform: scale(1.05); }
  }
  .article-card.read { opacity: 0.7; }

  .thumb-link { display: block; line-height: 0; overflow: hidden; }
  .thumb {
    display: block;
    width: 100%;
    aspect-ratio: 16 / 9;
    object-fit: cover;
    background: var(--chip-bg);
    transition: transform .35s ease;
  }

  .article-body {
    padding: 0.9rem 1.05rem 1.05rem;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
    flex: 1;
  }
  .article-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 0.5rem;
  }
  .article-top-left {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 0.35rem;
  }
  .chip {
    display: inline-block;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #fff;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.01em;
    border-radius: 6px;
    padding: 0.16rem 0.6rem;
    box-shadow: 0 2px 6px -2px color-mix(in srgb, var(--accent) 50%, transparent);
  }
  .read-badge {
    font-size: 0.68rem;
    font-weight: 600;
    color: var(--text-muted);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.14rem 0.5rem;
  }
  .like-btn {
    flex-shrink: 0;
    border: none;
    background: none;
    font-size: 1.3rem;
    line-height: 1;
    cursor: pointer;
    padding: 0;
    color: var(--text-muted);
    transition: transform .12s ease;
  }
  .like-btn:hover { transform: scale(1.15); }
  .like-btn.liked { color: var(--danger); }

  .article-link {
    text-decoration: none;
    color: var(--text);
  }
  .article-title {
    font-size: 1.02rem;
    font-weight: 700;
    line-height: 1.4;
    letter-spacing: -0.005em;
  }
  .article-summary {
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-top: 0.3rem;
  }
  .tag-row {
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem;
    margin-top: 0.5rem;
  }
  .tag {
    display: inline-block;
    border: 1px solid var(--border);
    background: none;
    color: var(--text-muted);
    font-size: 0.7rem;
    font-weight: 500;
    border-radius: 999px;
    padding: 0.08rem 0.55rem;
    cursor: pointer;
  }
  .tag:hover { border-color: var(--accent); color: var(--accent); }
  .tag.active { background: linear-gradient(135deg, var(--accent), var(--accent-2)); border-color: transparent; color: var(--accent-contrast); }

  .empty {
    color: var(--text-muted);
    text-align: center;
    padding: 3rem 0;
  }

  .site-footer {
    max-width: var(--maxw);
    margin: 0 auto;
    padding: 1.4rem clamp(1rem, 4vw, 2rem) 2.5rem;
    color: var(--text-muted);
    font-size: 0.78rem;
    text-align: center;
    border-top: 1px solid var(--border);
    margin-top: 1rem;
  }
  .site-footer a { color: var(--accent); text-decoration: none; font-weight: 600; }
  .site-footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
  <div class="top-accent-bar" aria-hidden="true"></div>

  <div class="masthead">
    <div class="masthead-inner">
      <div class="brand">
        <span class="brand-badge" aria-hidden="true">🔭</span>
        <div>
          <h1>発見ニュースまとめ</h1>
          <p class="tagline">科学・考古学・歴史発見とローカルニュースのダイジェスト</p>
        </div>
      </div>
      <div class="updated" id="updated"></div>
    </div>
  </div>

  <header class="site-header">
    <div class="search-row">
      <div class="search-wrap">
        <span class="search-icon" aria-hidden="true">🔍</span>
        <input type="search" id="search-input" class="search-input" autocomplete="off">
        <button class="search-clear" id="search-clear" type="button" aria-label="検索をクリア" hidden>✕</button>
      </div>
    </div>
    <div class="toolbar-row">
      <div class="filters lang-filters" id="lang-filters"></div>
      <div class="toolbar-actions">
        <button class="filter-toggle-btn" id="filter-toggle-btn" type="button" aria-expanded="false" aria-controls="filter-panel">
          <span id="filter-toggle-label">カテゴリ</span><span class="chevron" aria-hidden="true">▾</span>
        </button>
        <button class="copy-btn" id="copy-likes-btn" type="button">
          <span class="copy-btn-full">♥ 好みをコピー</span><span class="copy-btn-short" aria-hidden="true">♥</span>
        </button>
      </div>
    </div>
    <div class="filter-panel" id="filter-panel">
      <div class="filters" id="filters"></div>
      <div class="tag-filter-bar" id="tag-filter-bar"></div>
    </div>
  </header>

  <main>
    <div id="list"></div>
  </main>

  <footer class="site-footer">
    データは手動更新・スマホのブラウザにいいね/既読を保存 ·
    <a href="https://github.com/conaxsilver/news-digest" target="_blank" rel="noopener noreferrer">GitHub</a>
  </footer>

  <script>
    const LANGS = { ja: "日本語", en: "English", es: "Español" };
    const LIKES_KEY = "newsDigestLikes";
    const READS_KEY = "newsDigestReads";
    const DESKTOP_QUERY = "(min-width: 860px)";
    const SEARCH_PLACEHOLDERS = {
      ja: "キーワード検索(タイトル・概要・タグ)",
      en: "Search titles, summaries, tags",
      es: "Buscar por título, resumen o etiqueta"
    };
    const state = { articles: [], lang: "ja", category: "すべて", tag: null, query: "", likesOnly: false, unreadOnly: false, filtersOpen: false };

    function isDesktop() {
      return window.matchMedia(DESKTOP_QUERY).matches;
    }

    function loadFromStorage(key) {
      try {
        return JSON.parse(localStorage.getItem(key)) || {};
      } catch {
        return {};
      }
    }

    function loadLikes() {
      return loadFromStorage(LIKES_KEY);
    }

    function saveLikes(likes) {
      localStorage.setItem(LIKES_KEY, JSON.stringify(likes));
    }

    function isLiked(url) {
      return !!loadLikes()[url];
    }

    function toggleLike(url) {
      const likes = loadLikes();
      if (likes[url]) {
        delete likes[url];
      } else {
        likes[url] = true;
      }
      saveLikes(likes);
      render();
    }

    function loadReads() {
      return loadFromStorage(READS_KEY);
    }

    function saveReads(reads) {
      localStorage.setItem(READS_KEY, JSON.stringify(reads));
    }

    function isRead(url) {
      return !!loadReads()[url];
    }

    function markRead(url) {
      const reads = loadReads();
      if (reads[url]) return;
      reads[url] = true;
      saveReads(reads);
      render();
    }

    async function copyLikesToClipboard() {
      const likes = loadLikes();
      const liked = state.articles.filter(a => likes[a.url]);
      const text = JSON.stringify(
        liked.map(a => ({ date: a.date, lang: a.lang, category: a.category, title: a.title, url: a.url })),
        null, 2
      );
      try {
        await navigator.clipboard.writeText(text || "[]");
        alert(`${liked.length}件の「いいね」記事をコピーしました。次回Claudeに更新を頼むときに貼り付けてください。`);
      } catch {
        alert("コピーに失敗しました。ブラウザの権限設定を確認してください。");
      }
    }

    async function load() {
      const res = await fetch("data/news.json", { cache: "no-store" });
      state.articles = await res.json();
      document.getElementById("copy-likes-btn").onclick = copyLikesToClipboard;
      document.getElementById("filter-toggle-btn").onclick = () => {
        state.filtersOpen = !state.filtersOpen;
        render();
      };
      const searchInput = document.getElementById("search-input");
      searchInput.oninput = (e) => {
        state.query = e.target.value;
        renderSearchClear();
        renderList();
      };
      document.getElementById("search-clear").onclick = () => {
        state.query = "";
        searchInput.value = "";
        searchInput.focus();
        renderSearchClear();
        renderList();
      };
      render();
    }

    function renderSearchClear() {
      document.getElementById("search-clear").hidden = !state.query;
    }

    function render() {
      renderUpdated();
      document.getElementById("search-input").placeholder = SEARCH_PLACEHOLDERS[state.lang];
      renderSearchClear();
      renderLangFilters();
      renderFilters();
      renderTagFilterBar();
      renderFilterToggle();
      renderList();
    }

    function renderUpdated() {
      const el = document.getElementById("updated");
      if (!state.articles.length) { el.textContent = ""; return; }
      const latest = [...state.articles].sort((a, b) => b.date.localeCompare(a.date))[0];
      el.textContent = `最終更新: ${latest.date} / 記事数: ${state.articles.length}`;
    }

    function renderLangFilters() {
      const el = document.getElementById("lang-filters");
      el.innerHTML = "";
      for (const [code, label] of Object.entries(LANGS)) {
        const btn = document.createElement("button");
        btn.className = "filter-btn" + (code === state.lang ? " active" : "");
        btn.textContent = label;
        btn.onclick = () => { state.lang = code; state.category = "すべて"; state.tag = null; render(); };
        el.appendChild(btn);
      }
    }

    function renderFilters() {
      const inLang = state.articles.filter(a => a.lang === state.lang);
      const cats = ["すべて", ...new Set(inLang.map(a => a.category))];
      const el = document.getElementById("filters");
      el.innerHTML = "";
      for (const cat of cats) {
        const btn = document.createElement("button");
        btn.className = "filter-btn" + (cat === state.category ? " active" : "");
        btn.textContent = cat;
        btn.onclick = () => {
          state.category = cat;
          state.tag = null;
          if (!isDesktop()) state.filtersOpen = false;
          render();
        };
        el.appendChild(btn);
      }
      const likeBtn = document.createElement("button");
      likeBtn.className = "filter-btn" + (state.likesOnly ? " active" : "");
      likeBtn.textContent = "♥ お気に入りのみ";
      likeBtn.onclick = () => { state.likesOnly = !state.likesOnly; render(); };
      el.appendChild(likeBtn);

      const unreadBtn = document.createElement("button");
      unreadBtn.className = "filter-btn" + (state.unreadOnly ? " active" : "");
      unreadBtn.textContent = "未読のみ";
      unreadBtn.onclick = () => { state.unreadOnly = !state.unreadOnly; render(); };
      el.appendChild(unreadBtn);
    }

    function renderTagFilterBar() {
      const el = document.getElementById("tag-filter-bar");
      el.innerHTML = "";
      if (!state.tag) return;
      const chip = document.createElement("button");
      chip.className = "tag-filter-chip";
      chip.innerHTML = `🏷 ${state.tag} <span aria-hidden="true">✕</span>`;
      chip.onclick = () => { state.tag = null; render(); };
      el.appendChild(chip);
    }

    function renderFilterToggle() {
      const btn = document.getElementById("filter-toggle-btn");
      const panel = document.getElementById("filter-panel");
      const label = document.getElementById("filter-toggle-label");
      panel.classList.toggle("collapsed", !state.filtersOpen);
      btn.setAttribute("aria-expanded", String(state.filtersOpen));
      const parts = [];
      if (state.category !== "すべて") parts.push(state.category);
      if (state.tag) parts.push("#" + state.tag);
      if (state.likesOnly) parts.push("♥");
      if (state.unreadOnly) parts.push("未読");
      label.textContent = parts.length ? parts.join(" / ") : "カテゴリ";
      btn.classList.toggle("has-filter", parts.length > 0);
    }

    function toggleTag(t) {
      state.tag = (state.tag === t) ? null : t;
      state.category = "すべて";
      if (!isDesktop()) state.filtersOpen = false;
      render();
    }

    function buildArticleCard(a) {
      const card = document.createElement("div");
      card.className = "article-card" + (isRead(a.url) ? " read" : "");

      if (a.image) {
        const thumbLink = document.createElement("a");
        thumbLink.className = "thumb-link";
        thumbLink.href = a.url;
        thumbLink.target = "_blank";
        thumbLink.rel = "noopener noreferrer";
        thumbLink.addEventListener("click", () => markRead(a.url));
        const thumb = document.createElement("img");
        thumb.className = "thumb";
        thumb.src = a.image;
        thumb.alt = "";
        thumb.loading = "lazy";
        thumb.onerror = () => { thumbLink.remove(); };
        thumbLink.appendChild(thumb);
        card.appendChild(thumbLink);
      }

      const body = document.createElement("div");
      body.className = "article-body";

      const top = document.createElement("div");
      top.className = "article-top";

      const topLeft = document.createElement("div");
      topLeft.className = "article-top-left";
      const chip = document.createElement("span");
      chip.className = "chip";
      chip.textContent = a.category;
      topLeft.appendChild(chip);
      if (isRead(a.url)) {
        const readBadge = document.createElement("span");
        readBadge.className = "read-badge";
        readBadge.textContent = "既読";
        topLeft.appendChild(readBadge);
      }
      top.appendChild(topLeft);

      const liked = isLiked(a.url);
      const likeButton = document.createElement("button");
      likeButton.className = "like-btn" + (liked ? " liked" : "");
      likeButton.textContent = liked ? "♥" : "♡";
      likeButton.setAttribute("aria-label", "いいね");
      likeButton.onclick = () => toggleLike(a.url);
      top.appendChild(likeButton);
      body.appendChild(top);

      const link = document.createElement("a");
      link.className = "article-link";
      link.href = a.url;
      link.target = "_blank";
      link.rel = "noopener noreferrer";
      link.addEventListener("click", () => markRead(a.url));

      const titleEl = document.createElement("div");
      titleEl.className = "article-title";
      titleEl.textContent = a.title;
      link.appendChild(titleEl);

      if (a.summary) {
        const summaryEl = document.createElement("div");
        summaryEl.className = "article-summary";
        summaryEl.textContent = a.summary;
        link.appendChild(summaryEl);
      }
      body.appendChild(link);

      if (a.tags && a.tags.length) {
        const tagRow = document.createElement("div");
        tagRow.className = "tag-row";
        for (const t of a.tags) {
          const tagBtn = document.createElement("button");
          tagBtn.className = "tag" + (state.tag === t ? " active" : "");
          tagBtn.textContent = `#${t}`;
          tagBtn.onclick = () => toggleTag(t);
          tagRow.appendChild(tagBtn);
        }
        body.appendChild(tagRow);
      }

      card.appendChild(body);
      return card;
    }

    function buildDateGroups(list) {
      const container = document.createDocumentFragment();
      const byDate = {};
      for (const a of list) {
        (byDate[a.date] ??= []).push(a);
      }
      const dates = Object.keys(byDate).sort((a, b) => b.localeCompare(a));
      for (const date of dates) {
        const group = document.createElement("div");
        group.className = "date-group";
        const heading = document.createElement("div");
        heading.className = "date-heading";
        heading.textContent = date;
        group.appendChild(heading);
        for (const a of byDate[date]) {
          group.appendChild(buildArticleCard(a));
        }
        container.appendChild(group);
      }
      return container;
    }

    function renderList() {
      const el = document.getElementById("list");
      el.innerHTML = "";
      const likes = loadLikes();
      const reads = loadReads();
      const inLang = state.articles.filter(a => a.lang === state.lang);
      let filtered = state.category === "すべて"
        ? inLang
        : inLang.filter(a => a.category === state.category);
      if (state.tag) {
        filtered = filtered.filter(a => a.tags && a.tags.includes(state.tag));
      }
      if (state.likesOnly) {
        filtered = filtered.filter(a => likes[a.url]);
      }
      if (state.unreadOnly) {
        filtered = filtered.filter(a => !reads[a.url]);
      }
      const q = state.query.trim().toLowerCase();
      if (q) {
        filtered = filtered.filter(a =>
          a.title.toLowerCase().includes(q) ||
          (a.summary && a.summary.toLowerCase().includes(q)) ||
          a.category.toLowerCase().includes(q) ||
          (a.tags && a.tags.some(t => t.toLowerCase().includes(q)))
        );
      }

      if (!filtered.length) {
        el.innerHTML = '<div class="empty">記事がありません</div>';
        return;
      }

      if (state.category !== "すべて" || q) {
        el.appendChild(buildDateGroups(filtered));
        return;
      }

      const byCategory = {};
      for (const a of filtered) {
        (byCategory[a.category] ??= []).push(a);
      }
      const categories = Object.keys(byCategory).sort((c1, c2) => {
        const max1 = byCategory[c1].reduce((m, a) => (a.date > m ? a.date : m), "");
        const max2 = byCategory[c2].reduce((m, a) => (a.date > m ? a.date : m), "");
        return max2.localeCompare(max1);
      });

      for (const cat of categories) {
        const details = document.createElement("details");
        details.className = "category-group";
        details.open = true;
        const summary = document.createElement("summary");
        summary.className = "category-summary";
        summary.innerHTML = `${cat}<span class="cat-count">${byCategory[cat].length}件</span>`;
        details.appendChild(summary);
        details.appendChild(buildDateGroups(byCategory[cat]));
        el.appendChild(details);
      }
    }

    load();
  </script>
</body>
</html>
